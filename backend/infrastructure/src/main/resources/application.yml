server:
  port: 9080

spring:
  application:
    name: all-citizens

  datasource:
    url: jdbc:postgresql://localhost:5432/allcitizens?stringtype=unspecified
    username: allcitizens
    password: allcitizens
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9180/realms/allcitizens
          jwk-set-uri: http://localhost:9180/realms/allcitizens/protocol/openid-connect/certs

app:
  attachments:
    directory: ${user.dir}/data/attachments
  audit:
    # When true, also persist GET /api/v1/** (except /public). Default: only mutations.
    log-get-requests: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.allcitizens: DEBUG
    org.hibernate.SQL: DEBUG
